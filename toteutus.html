   <main>
    <div id="vastaus"></div>

    <script>
        fetch("assets/toteutus.JSON")
            // Muunnetaan vastaus toteutus.JSON-tietue JS Olio muotoon
            .then(function (response) {
                return response.json();
            })

            //Käsitellään muunnettu (eli JSON muotoinen) vastaus
                // Kutsutaan funktiota kerro()ja välitetään sille json-vastaus
            .then(function (responseJson) {
                kerro(responseJson);
            })

            // Virheenkäsittely
            .catch(function (error) {
                document.getElementById("vastaus").innerHTML =
                    "<p>Tietoa ei pystytä hakemaan</p>";
            });

        // Funktio joka lukee JSON-olion ja kirjoittaa sisällön sivulle, sama kuin etusivu. Simppelimpi.
        function kerro(obj) {
            let tiedot =
                "<h1>" +
                obj.toteutuksenNimi +
                "</h1><br>" +
                "<hr>" +
                "<p><img src='assets/" +
                obj.image +
                "'></p>" +

                "<center><h3>Toteutuksen tiedot</h3>" +
                "Osallistujien lukumäärä: " +
                obj.osallistujienLukumäärä +
                "<br>" +
                "Osallistujat: " +
                obj.osallistujienNimet.join(", ") +
                "<br>" +
                "Alkupäivä: " +
                obj.toteutuksenAlkuPvm +
                "<br>" +
                "Loppupäivä: " +
                obj.toteutuksenLoppuPvm +
                "<br>" +
                "Kesto: " +
                obj.toteutuksenKestoViikkoina +
                " viikkoa<br></center>" +
                "<hr>";

            document.getElementById("vastaus").innerHTML = tiedot;
            //Oletukseni on, että ei tarvitse olla 1-1 sama kuin esimerkissä,
            //näin voin uudelleen käyttää #vastaus-tyylejä.
        }
    </script>

</main>
