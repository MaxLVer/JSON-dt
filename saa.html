    <main>
        <div id="saa"></div>

        <script>
            // Haetaan Helsingin sää OpenWeatherMap API:sta, kieli Suomi ja lämpötilat Celsius-asteina
            fetch("https://api.openweathermap.org/data/2.5/weather?q=Helsinki&appid=8044cbbb12c2ba2702009c38ecc603e5&units=metric&lang=fi")
                .then(response => {
                    if (!response.ok) throw new Error("Tietoa ei saatu haettua");
                    return response.json();
                })
                .then(data => {
                    naytaSaa(data);
                })
                .catch(error => {
                    document.getElementById("saa").innerHTML =
                        "<p>Haussa tapahtui virhe...</p>";
                });
            
            // Muutetaan OpenWeatherMap API:n dt-kenttä (UNIX-aikaleima) luettavaksi kellonajaksi
            // Replace-metodi jotta saadaan pisteet kaksoispisteiksi... Ehkä olemassa helpompikin tapa, mutta toimii
            function saaAika(obj) {
                return new Date(obj.dt * 1000).toLocaleTimeString('fi-FI', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
            }

            // Näytetään sää sivulla
            function naytaSaa(obj) {
                document.getElementById("saa").innerHTML = `
            <h1>Sää Helsingissä</h1>
            <hr>
            <p>Sää kello ${saaAika(obj)}</p>
            <p><b>Sää:</b></p>
            <p>${obj.weather[0].description}</p>
            <p><b>Lämpötila:</b></p> 
            <p>${obj.main.temp} °C</p>
            <p><b>Tuuli:</b></p>
            <p>${obj.wind.speed} m/s</p>

            <img src="https://openweathermap.org/img/wn/${obj.weather[0].icon}@2x.png"
                 alt="Sääkuvake">`;
            }

            // Olen tehnyt jo saman tehtävän react-kursilla, joten refaktoroin sen koodin toimimaan ilman Reactia tai babelia.
        </script>
    </main>
