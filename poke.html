    <link rel="stylesheet" href="assets/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

                aria-controls="collapsibleNavbar" aria-expanded="false" aria-label="Avaa valikko">

    <main>
        <!-- #poke, tyylejä varten -->
        <div id="poke">
            <!-- Sisältö -->

            <h1>Pokémon Haku</h1>
            <hr>

            <input type="text" id="pokemonName" placeholder="Enter Pokemon name">
            <select id="pokemonSelect"></select>
            <button onclick="poke()">Hae</button>
            </select>

            <div id="nimi">Kirjoita nimi tai valitse listasta</div>
            <p id="kuva2"></p>
            <hr>

        </div>

        <script>
            // Lataa kaikki Pokémon-nimet dropdowniin, 
            // ei tehtävänannon mukaan tarpeellinen, mutta helpotti testausta.

            // Globaalit muuttujat tallentavat haetun Pokémonin, kääntämistä varten
            let currentPokemon = null;
            let showingBack = false;

            // ========== Dropdownin lataus ==========

            fetch("https://pokeapi.co/api/v2/pokemon?limit=2000")
                .then(response => {
                    // Tarkistetaan että palvelin vastasi oikein
                    if (!response.ok) throw new Error("Verkkovirhe ladattaessa listaa");
                    return response.json();
                })
                .then(data => {

                    const select = document.getElementById("pokemonSelect");

                    // Dropdownin ensimmäinen vaihtoehto, yhtä kuin tyhjä valinta
                    select.innerHTML = '<option value="">Pokédex</option>';

                    // Käydään läpi kaikki Pokémonit ja lisätään ne dropdowniin
                    data.results.forEach(p => {
                        const opt = document.createElement("option");
                        opt.value = p.name;
                        //
                        opt.textContent = p.name.charAt(0).toUpperCase() + p.name.slice(1);
                        select.appendChild(opt);
                    });
                })
                .catch(error => {
                    // Näytetään virhe
                    console.error("Virhe ladattaessa Pokémon-listaa:", error);
                    document.getElementById("nimi").innerHTML =
                        "Pokémon-listaa ei voitu ladata...";
                });

            // ========== Pokémonin haku ja näyttö ==========

            // Hae Pokémonit
            function poke() {
                const input = document.getElementById("pokemonName").value.toLowerCase().trim();
                const dropdown = document.getElementById("pokemonSelect").value;

                // Priorisoi dropdownin valintaa, mutta hyväksyy myös tekstikentän syötteen
                const pokeName = dropdown || input;

                // Jos ei nimeä, näytä ohje
                if (!pokeName) {
                    document.getElementById("nimi").innerHTML = "Anna nimi tai valitse listasta!";
                    document.getElementById("kuva2").innerHTML = "";

                    // Jotta funktio ei jatkaisi ilman nimeä, palautetaan tässä vaiheessa
                    return;
                }

                // Näytetään latausviesti...
                document.getElementById("nimi").innerHTML = "Haetaan...";
                document.getElementById("kuva2").innerHTML = "";

                // Hae Pokémonin tiedot API:sta, virheenkäsittely mukana vaikka niitä ei ehkä tarvitse.
                fetch(`https://pokeapi.co/api/v2/pokemon/${pokeName}`)
                    .then(response => {
                        // Tarkistetaan että Pokémon löytyi
                        if (response.status === 404) throw new Error("Ei löydy");
                        if (!response.ok) throw new Error("Palvelinvirhe");
                        return response.json();
                    })
                    .then(data => {
                        // Tarkistetaan että sprite löytyy
                        if (!data.sprites || !data.sprites.front_default) {
                            throw new Error("Kuvaa ei saatavilla");
                        }

                        currentPokemon = data;
                        showingBack = false; // Oletuksena etupuoli, niin pidetään false

                        pokekuva(data, pokeName);
                    })
                    .catch(error => {
                        console.error("Virhe haettaessa Pokémonia:", error);
                        document.getElementById("nimi").innerHTML =
                            "Pokémonia ei löytynyt, tarkista nimi!";
                        document.getElementById("kuva2").innerHTML = "";
                    });

                //Virheenkäsittelyn luonnin apuna käytetty koodieditori ZED.DEV:in Inline Assist-työkalun ehdotusten avulla.
                //Kommenttien sisältöä myös luotu samalla tavalla.
            }

            // ========== Pokémonin kuva ja nimi + Statsit==========
            function pokekuva(obj, name) {
                const sprite = showingBack
                    ? obj.sprites.back_default
                    : obj.sprites.front_default;

                    // Näytä kuva ja käännä-painike
                document.getElementById("kuva2").innerHTML = `
                    <img src="${sprite}" alt="Pokemonin kuva">
                    <br>
                    <button onclick="kaanna()">Käännä</button>
                    `;

                    // Näytä Pokémonin nimi, tyyppi ja statsit.
                document.getElementById("nimi").innerHTML = `
                    <b>${name.charAt(0).toUpperCase() + name.slice(1)}</b><br>
                    A ${obj.types[0].type.name.charAt(0).toUpperCase() + obj.types[0].type.name.slice(1)} type Pokémon<br>
                    <br>
                    <b>Stats:</b><br>
                    HP: ${obj.stats[0].base_stat}<br>
                    Attack: ${obj.stats[1].base_stat}<br>
                    Defense: ${obj.stats[2].base_stat}<br>
                    Speed: ${obj.stats[5].base_stat}<br>
                    Base XP: ${obj.base_experience}<br>
                    Height: ${obj.height} │ Weight: ${obj.weight}<br>
                    `;

                document.getElementById("pokemonName").value = "";
                document.getElementById("pokemonSelect").value = "";
            }

            // Käännä kuvaa, eli vaihda front/back ja päivitä kuva
            function kaanna() {
                //Jos tyhjä, ei tehdä mitään
                if (!currentPokemon) return;

                // Vaihdetaan front/back
                showingBack = !showingBack;

                // Päivitetään kuva
                pokekuva(currentPokemon, currentPokemon.name);
            }
        </script>
